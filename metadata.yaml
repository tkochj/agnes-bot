name: astrbot_plugin_agnes
display_name: 🎨 Agnes AI 生图/生视频
short_desc: 一键生图、生视频，支持 agnes-image-2.1-flash 和 agnes-video-v2.0
desc: |-
  在本地运行 Agnes AI Proxy，提供 OpenAI 兼容的生图/生视频接口。
  
  🔧 配置方法（二选一）：
  1. 在 AstrBot 面板 → 插件配置 → 填入 api_key
  2. 在 cmd_config.json 中找到 "openai" provider 中指向 127.0.0.1:1241 的 key（插件自动识别）
  
  💬 命令：
  - /画图 <描述>        文生图
  - /改图 <描述>        图改图（需先发图片）
  - /生视频 <描述>      文生视频
  - /图生视频 <描述>    图生视频（需先发图片）
  - /生图模型           查看可用模型
  - /设置模型 <模型名>  动态切换模型
  
  📦 仓库: https://github.com/tkochj/agnes-bot
  📖 模型文档: 查看 Agnes AI 官方文档获取最新模型列表
version: v2.1.0
author: auto
repo: https://github.com/tkochj/agnes-bot
params:
  api_key:
    friendly_name: Agnes API Key
    description: Agnes AI 的 API Key，与 openai provider 中指向 127.0.0.1:1241 的 key 一致
    type: string
    default: ""
    hint: 在 cmd_config.json 中 openai provider 配的 key
    optional: true
  image_model:
    friendly_name: 默认生图模型
    description: 文生图/图改图使用的模型，如 agnes-image-2.1-flash
    type: string
    default: "agnes-image-2.1-flash"
    hint: 可用 /生图模型 查看全部模型 /设置模型 动态切换
    optional: true
  video_model:
    friendly_name: 默认生视频模型
    description: 文生视频/图生视频使用的模型，如 agnes-video-v2.0
    type: string
    default: "agnes-video-v2.0"
    hint: 可用 /生图模型 查看全部模型 /设置模型 动态切换
    optional: true
  image_size:
    friendly_name: 默认图片尺寸
    description: 生图尺寸，如 1024x1024
    type: string
    default: "1024x1024"
    hint: 部分模型支持 1024x1024 / 1024x1792 / 1792x1024 等
    optional: true
  custom_models:
    friendly_name: 自定义模型列表
    description: 用户自行添加的额外模型，英文逗号分隔（插件自动合并到 /生图模型 列表）
    type: string
    default: ""
    hint: 例如 agnes-image-2.0,agnes-image-2.1,my-custom-model
    optional: true
